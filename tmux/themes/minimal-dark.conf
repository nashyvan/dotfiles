## COLORSCHEME: minimal-dark

# Enable the status bar
set-option -g status on

# Global style for the status bar (center area)
set-option -g status-style bg=colour234,fg=colour231

# Left side: tmux session name with visible separator
set-option -g status-left "#[bg=colour234,fg=colour244] #S #[bg=colour234,fg=colour239]|"

# Right side: date and hostname with visible separator
set-option -g status-right "#[bg=colour234,fg=colour246] %Y-%m-%d #[bg=colour234,fg=colour239]|#[bg=colour234,fg=colour246] %H:%M #[bg=colour234,fg=colour248]#[bg=colour234,fg=colour239]|#[bg=colour234,fg=colour246] #h "

# Inactive window tabs
set-window-option -g window-status-style bg=colour234,fg=colour244
set-window-option -g window-status-format " #I: #W "

# Active window tab
set-window-option -g window-status-current-style bg=colour237,fg=colour255
set-window-option -g window-status-current-format " #I: #W "

# No separators between window tabs
set-window-option -g window-status-separator ""

# Style for messages and command prompts
set-option -g message-style bg=colour238,fg=colour255
set-option -g message-command-style bg=colour238,fg=colour255

# Pane borders
set-option -g pane-border-style fg=colour238
set-option -g pane-active-border-style fg=colour250

# Display colours for pane numbers (prefix + q)
set-option -g display-panes-active-colour colour250
set-option -g display-panes-colour colour234

# Clock mode (prefix + t)
set-window-option -g clock-mode-colour colour250

# Window with bell alert styling
set-window-option -g window-status-bell-style bg=colour167,fg=colour234

# Additional layout settings
set-option -g status-justify left
set-option -g status-left-style none
set-option -g status-right-style none
set-option -g status-left-length 40
set-option -g status-right-length 40
