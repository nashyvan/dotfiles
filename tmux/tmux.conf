set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g history-limit 10000

set-option -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

#set -g prefix C-a
#unbind C-b
#bind C-a send-prefix

#unbind %
#bind | split-window -h 

#unbind '"'
#bind - split-window -v

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
#bind -r m resize-pane -Z

bind -r "{" run "tmux swap-window -d -t $((#{window_index}-1))"
bind -r "}" run "tmux swap-window -d -t $((#{window_index}+1))"

set -g mouse on

set-window-option -g mode-keys vi

bind -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

# swap windows
#bind -n C-S-Left swap-window -t -1\; select-window -t -1
#bind -n C-S-Right swap-window -t +1\; select-window -t +1

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

#set -g @plugin 'khanghh/tmux-dark-plus-theme'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# source-file ~/.config/tmux/themes/default.conf
# source-file ~/.config/tmux/themes/gruvbox-dark.conf
source-file ~/.config/tmux/themes/minimal-dark.conf

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
